components:
  securitySchemes:
    AdminKey:
      type: http
      scheme: bearer
      description: Static admin key from COCOLA_ADMIN_KEY.
    RuntimeBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: cocola runtime token.
  parameters:
    ID:
      in: path
      name: id
      required: true
      schema:
        type: string
    Name:
      in: path
      name: name
      required: true
      schema:
        type: string
    UsageFrom:
      in: query
      name: from
      schema:
        type: string
        description: RFC3339 timestamp or YYYY-MM-DD.
    UsageTo:
      in: query
      name: to
      schema:
        type: string
        description: RFC3339 timestamp or YYYY-MM-DD.
    UsageBucket:
      in: query
      name: bucket
      schema:
        type: string
        enum: [auto, hour, day]
        default: auto
  requestBodies:
    AuthUserCreate:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              username:
                type: string
              email:
                type: string
                format: email
              role:
                type: string
                enum: [user, admin]
              enabled:
                type: boolean
              password:
                type: string
                format: password
    AuthUserUpdate:
      content:
        application/json:
          schema:
            type: object
            properties:
              username:
                type: string
              email:
                type: string
                format: email
              role:
                type: string
                enum: [user, admin]
              enabled:
                type: boolean
    Skill:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Skill"
    ArchiveScan:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              filename:
                type: string
              mime:
                type: string
              size_bytes:
                type: integer
              content_b64:
                type: string
                format: byte
              selected_ids:
                type: array
                items:
                  type: string
    GitScan:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              repo_url:
                type: string
              ref:
                type: string
              path:
                type: string
              selected_ids:
                type: array
                items:
                  type: string
    MCP:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MCPServer"
    AgentPrompt:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AgentPrompt"
    LLMProvider:
      content:
        application/json:
          schema:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              type:
                type: string
              base_url:
                type: string
              api_key:
                type: string
                format: password
                description: Secret value; use redacted examples only.
              enabled:
                type: boolean
    LLMModel:
      content:
        application/json:
          schema:
            type: object
            properties:
              alias:
                type: string
              provider_id:
                type: string
              real_model:
                type: string
              runtime:
                type: string
              label:
                type: string
              icon_type:
                type: string
              icon_slug:
                type: string
              icon_url:
                type: string
              enabled:
                type: boolean
              visible:
                type: boolean
              is_default:
                type: boolean
              sort_order:
                type: integer
    ScheduledTask:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ScheduledTask"
  responses:
    Error:
      description: Standard cocola error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Object:
      description: JSON object.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Object"
    Skill:
      description: Skill.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Skill"
    Skills:
      description: Skills.
      content:
        application/json:
          schema:
            type: object
            properties:
              skills:
                type: array
                items:
                  $ref: "#/components/schemas/Skill"
    SkillScan:
      description: Scan result with valid skills and validation errors.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Object"
    MCP:
      description: MCP server.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MCPServer"
    MCPs:
      description: MCP servers.
      content:
        application/json:
          schema:
            type: object
            properties:
              mcps:
                type: array
                items:
                  $ref: "#/components/schemas/MCPServer"
    AgentPrompt:
      description: Agent prompt.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AgentPrompt"
    ScheduledTask:
      description: Scheduled task.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ScheduledTask"
    ScheduledTasks:
      description: Scheduled tasks.
      content:
        application/json:
          schema:
            type: object
            properties:
              tasks:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduledTask"
  schemas:
    Object:
      type: object
      additionalProperties: true
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
      required: [status]
    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: PERMISSION_DENIED
            message:
              type: string
              example: admin authentication required
          required: [code, message]
      required: [error]
    LoginRequest:
      type: object
      properties:
        identifier:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
      required: [password]
    AuthUser:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
        enabled:
          type: boolean
    SystemSetting:
      type: object
      additionalProperties: true
      properties:
        key:
          type: string
        value: {}
        source:
          type: string
        version:
          type: integer
    Skill:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        version:
          type: string
        entrypoint:
          type: string
        enabled:
          type: boolean
        owner_type:
          type: string
          enum: [admin, user]
    MCPServer:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        transport:
          type: string
          enum: [stdio, http, sse]
        command:
          type: string
        args:
          type: array
          items:
            type: string
        url:
          type: string
          description: May contain placeholders for encrypted URL variables.
        url_vars:
          type: object
          additionalProperties:
            type: string
          description: Secret values are returned only as masked hints in UI responses.
        env:
          type: object
          additionalProperties:
            type: string
        headers:
          type: object
          additionalProperties:
            type: string
        enabled:
          type: boolean
        default_enabled:
          type: boolean
        status:
          type: string
    AgentPrompt:
      type: object
      properties:
        name:
          type: string
        content:
          type: string
        enabled:
          type: boolean
    ScheduledTask:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
        schedule_kind:
          type: string
        schedule_spec:
          type: object
          additionalProperties: true
        timezone:
          type: string
        prompt:
          type: string
        model_alias:
          type: string
        config_json:
          type: object
          additionalProperties: true
    TokenUsageReport:
      type: object
      properties:
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        bucket:
          type: string
          enum: [hour, day]
        summary:
          $ref: "#/components/schemas/TokenUsageSummary"
        trend:
          type: array
          items:
            $ref: "#/components/schemas/TokenUsagePoint"
        users:
          type: array
          items:
            $ref: "#/components/schemas/TokenUsageUser"
    TokenUsageSummary:
      type: object
      properties:
        calls:
          type: integer
        user_count:
          type: integer
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer
        cost_usd:
          type: number
    TokenUsagePoint:
      type: object
      properties:
        bucket_start:
          type: string
          format: date-time
        calls:
          type: integer
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer
        cost_usd:
          type: number
    TokenUsageUser:
      type: object
      properties:
        user_id:
          type: string
        username:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
        enabled:
          type: boolean
        known_user:
          type: boolean
        calls:
          type: integer
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer
        cost_usd:
          type: number
        last_used_at:
          type: string
          format: date-time
