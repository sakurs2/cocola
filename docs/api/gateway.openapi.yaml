openapi: 3.0.3
info:
  title: cocola Gateway API
  version: 0.0.1
  description: Public browser-facing API for chat streaming, conversation history, and artifacts.
servers:
  - url: http://127.0.0.1:8080
    description: Local dev gateway
tags:
  - name: Health
  - name: Chat
  - name: Conversations
  - name: Artifacts
paths:
  /healthz:
    get:
      tags: [Health]
      operationId: gatewayHealthz
      summary: Check gateway liveness.
      responses:
        "200":
          description: Gateway is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/chat:
    post:
      tags: [Chat]
      operationId: streamChat
      summary: Start an agent turn and stream events over SSE.
      security:
        - RuntimeBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Server-Sent Events stream with agent lifecycle, message, tool, and artifact events.
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE event stream.
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/conversations:
    get:
      tags: [Conversations]
      operationId: listConversations
      summary: List conversations owned by the authenticated user.
      security:
        - RuntimeBearer: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: cursor
          schema:
            type: string
      responses:
        "200":
          description: Conversation list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: "#/components/schemas/Conversation"
                  next_cursor:
                    type: string
        "401":
          $ref: "#/components/responses/Error"
  /v1/conversations/{id}:
    patch:
      tags: [Conversations]
      operationId: renameConversation
      summary: Rename a conversation.
      security:
        - RuntimeBearer: []
      parameters:
        - $ref: "#/components/parameters/ConversationID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameConversationRequest"
      responses:
        "200":
          description: Updated conversation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Conversations]
      operationId: deleteConversation
      summary: Delete a conversation and release its runtime binding when possible.
      security:
        - RuntimeBearer: []
      parameters:
        - $ref: "#/components/parameters/ConversationID"
      responses:
        "204":
          description: Conversation deleted.
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/conversations/{id}/messages:
    get:
      tags: [Conversations]
      operationId: getConversationMessages
      summary: Read rendered user and agent messages for one conversation.
      security:
        - RuntimeBearer: []
      parameters:
        - $ref: "#/components/parameters/ConversationID"
      responses:
        "200":
          description: Conversation messages.
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation:
                    $ref: "#/components/schemas/Conversation"
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConversationMessage"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/conversations/{id}/artifacts/{artifact_id}:
    get:
      tags: [Artifacts]
      operationId: downloadArtifact
      summary: Download an artifact produced by a conversation.
      security:
        - RuntimeBearer: []
      parameters:
        - $ref: "#/components/parameters/ConversationID"
        - in: path
          name: artifact_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Artifact bytes.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    RuntimeBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: cocola runtime token issued by admin-api.
  parameters:
    ConversationID:
      in: path
      name: id
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Standard cocola error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
      required: [status]
    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: INVALID_ARGUMENT
            message:
              type: string
              example: request body must be JSON
          required: [code, message]
      required: [error]
    ChatRequest:
      type: object
      properties:
        prompt:
          type: string
        session_id:
          type: string
          description: Optional client session id; generated by the server when omitted.
        sandbox_id:
          type: string
        max_turns:
          type: integer
          format: int32
        model_alias:
          type: string
        model_label:
          type: string
        model_icon:
          type: object
          additionalProperties:
            type: string
        conversation_title:
          type: string
        conversation_type:
          type: string
        defer_conversation_visibility_until_done:
          type: boolean
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/Attachment"
      required: [prompt]
    Attachment:
      type: object
      properties:
        filename:
          type: string
        content_b64:
          type: string
          format: byte
        mime:
          type: string
      required: [filename, content_b64]
    RenameConversationRequest:
      type: object
      properties:
        title:
          type: string
      required: [title]
    Conversation:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        title:
          type: string
        user_id:
          type: string
        session_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ConversationMessage:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, assistant, system, tool]
        content:
          type: string
        created_at:
          type: string
          format: date-time
