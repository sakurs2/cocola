syntax = "proto3";

package cocola.sandbox.v1;

option go_package = "github.com/cocola-project/cocola/packages/proto/gen/go/cocola/sandbox/v1;sandboxv1";

// SandboxService is implemented by sandbox-manager and called by agent-runtime.
//
// M1 fills in the full lifecycle (Exec streaming, file IO, pause/resume) on top
// of the M0 Create/Destroy/Health stubs. The wire contract maps 1:1 onto the
// SandboxProvider Go interface so any backend (Docker today; K8s+gVisor later)
// is swappable without touching the service layer.
service SandboxService {
  rpc Create(CreateRequest) returns (CreateResponse);
  // Exec streams stdout/stderr chunks followed by a terminal EXIT (or ERROR) event.
  rpc Exec(ExecRequest) returns (stream ExecEvent);
  rpc WriteFile(WriteFileRequest) returns (WriteFileResponse);
  rpc ReadFile(ReadFileRequest) returns (ReadFileResponse);
  rpc Pause(PauseRequest) returns (PauseResponse);
  rpc Resume(ResumeRequest) returns (ResumeResponse);
  rpc Destroy(DestroyRequest) returns (DestroyResponse);
  rpc Health(HealthRequest) returns (HealthResponse);

  // --- M2: session<->sandbox binding lifecycle ---------------------------
  // Acquire returns the sandbox bound to a session, creating (or resuming) one
  // on first touch. Concurrent calls for the same session converge on a single
  // sandbox. This is the entry point agent-runtime uses instead of raw Create.
  rpc Acquire(AcquireRequest) returns (AcquireResponse);
  // Heartbeat renews a sandbox's lease so the reaper does not reclaim it while
  // a long-running task holds it between Acquire calls.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  // Release explicitly unbinds and destroys a session's sandbox immediately,
  // skipping the lease grace period (clean session end).
  rpc Release(ReleaseRequest) returns (ReleaseResponse);

  // --- Preview Proxy: resolve an in-sandbox port to a reachable URL ---------
  // ResolveEndpoint maps a session's bound sandbox + an in-sandbox port to a
  // server-reachable URL (plus any auth headers to replay). It powers the
  // gateway's Preview Proxy: a user-launched dev server on port N inside the
  // sandbox becomes browsable through the gateway without exposing the sandbox
  // network. Reuses the same OpenSandbox lifecycle endpoints API the provider
  // already uses to reach execd.
  rpc ResolveEndpoint(ResolveEndpointRequest) returns (ResolveEndpointResponse);
}

message Resources {
  double cpu_cores = 1;
  int64 memory_mib = 2;
  int64 disk_mib = 3;
}

message SandboxSpec {
  string user_id = 1;
  string session_id = 2;
  string image = 3;
  map<string, string> env = 4;
  Resources resources = 5;
  // egress_allowlist controls the sandbox's outbound network policy (ADR-0009).
  // The provider distinguishes "unset" from "set but empty":
  //   - unset  -> no egress policy configured; legacy wide-open behaviour.
  //   - set    -> egress firewall is enforced. A DNS + in-cluster llm-gateway
  //               baseline is ALWAYS allowed (so the gateway is never cut off);
  //               every additional CIDR/IP entry widens that baseline. Domain
  //               entries need a DNS-aware CNI (e.g. Cilium toFQDNs) to be
  //               pinned precisely; a vanilla CNI / iptables layer skips them.
  // NOTE: proto3 cannot tell an empty repeated field from an absent one on the
  // wire, so callers that want the enforced-with-baseline posture must route an
  // explicitly-configured allowlist (the orchestrator always folds in the
  // gateway host, guaranteeing a non-empty list in practice).
  repeated string egress_allowlist = 6;
}

message Sandbox {
  string id = 1;
  string user_id = 2;
  string session_id = 3;
  string endpoint = 4;
}

message CreateRequest {
  SandboxSpec spec = 1;
}
message CreateResponse {
  Sandbox sandbox = 1;
}

message ExecRequest {
  string sandbox_id = 1;
  repeated string cmd = 2;
  string cwd = 3;
  map<string, string> env = 4;
  bytes stdin = 5;
  int32 timeout_secs = 6; // 0 = provider default; negative = no deadline
}

enum ExecEventKind {
  EXEC_EVENT_KIND_UNSPECIFIED = 0;
  EXEC_EVENT_KIND_STDOUT = 1;
  EXEC_EVENT_KIND_STDERR = 2;
  EXEC_EVENT_KIND_EXIT = 3;
  EXEC_EVENT_KIND_ERROR = 4;
}

message ExecEvent {
  ExecEventKind kind = 1;
  bytes stdout = 2;
  bytes stderr = 3;
  int32 exit_code = 4;
  string error = 5;
}

message WriteFileRequest {
  string sandbox_id = 1;
  string path = 2;
  bytes data = 3;
}
message WriteFileResponse {}

message ReadFileRequest {
  string sandbox_id = 1;
  string path = 2;
}
message ReadFileResponse {
  bytes data = 1;
}

message PauseRequest {
  string sandbox_id = 1;
}
message PauseResponse {}

message ResumeRequest {
  string sandbox_id = 1;
}
message ResumeResponse {}

message DestroyRequest {
  string sandbox_id = 1;
}
message DestroyResponse {}

message HealthRequest {
  string sandbox_id = 1;
}
message HealthResponse {
  bool healthy = 1;
  string detail = 2;
}

// --- M2 binding messages -------------------------------------------------

message AcquireRequest {
  string session_id = 1;
  string user_id = 2;
  string image = 3;
  map<string, string> env = 4;
  // Explicit user consent to discard an unavailable node-local workspace.
  bool allow_workspace_reset = 5;
  // Trusted per-session additions to the platform egress policy. Only
  // agent-runtime may set these; browser input never reaches this field.
  repeated string additional_egress_allowlist = 6;
}

enum WorkspaceState {
  WORKSPACE_STATE_UNSPECIFIED = 0;
  WORKSPACE_STATE_FRESH = 1;
  WORKSPACE_STATE_PRESERVED = 2;
  WORKSPACE_STATE_RESET = 3;
}

message AcquireResponse {
  Sandbox sandbox = 1;
  // reused is true when an existing sandbox was returned (hit), false on a
  // fresh create (miss). Lets callers observe pool behaviour.
  bool reused = 2;
  WorkspaceState workspace_state = 3;
  string workspace_node = 4;
  string previous_workspace_node = 5;
}

message HeartbeatRequest {
  string sandbox_id = 1;
}
message HeartbeatResponse {}

message ReleaseRequest {
  string session_id = 1;
  string user_id = 2;
}
message ReleaseResponse {}

// --- Preview Proxy messages ----------------------------------------------

message ResolveEndpointRequest {
  string session_id = 1;
  string user_id = 2;
  // port is the in-sandbox TCP port to expose (e.g. a dev server on 3000).
  int32 port = 3;
}

message ResolveEndpointResponse {
  // url is a server-reachable base URL for the in-sandbox port. Callers append
  // the request path/query. It already includes any scheme + host + base path
  // the provider proxy requires.
  string url = 1;
  // headers carries per-sandbox auth/routing to replay on every proxied request
  // (e.g. X-EXECD-ACCESS-TOKEN / OPEN-SANDBOX-API-KEY).
  map<string, string> headers = 2;
}
