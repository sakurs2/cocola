syntax = "proto3";

package cocola.agent.v1;

option go_package = "github.com/cocola-project/cocola/packages/proto/gen/go/cocola/agent/v1;agentv1";

// AgentRuntimeService is called by gateway. Stream returns agent events.
//
// Event envelope is intentionally generic so we can add new event kinds (e.g.
// `thinking`, `permission_request`) without breaking the schema. Consumers
// must tolerate unknown kinds gracefully.
service AgentRuntimeService {
  rpc Query(QueryRequest) returns (stream AgentEvent);
  rpc ReleaseSession(ReleaseSessionRequest) returns (ReleaseSessionResponse);
  rpc ListRuntimes(ListRuntimesRequest) returns (ListRuntimesResponse);
}

message QueryRequest {
  string user_id = 1;
  string session_id = 2;
  string prompt = 3;
  string sandbox_id = 4;
  int32 max_turns = 5;
  // User-uploaded files, pre-provisioned into the sandbox workspace before the
  // agent runs (push model, ADR-0017). P0 carries small files inline; large
  // binaries go through object storage in a later phase.
  repeated Attachment attachments = 6;
  // Stable product runtime selected when the conversation was created.
  string runtime_id = 7;
}

// Attachment is a single user-uploaded file delivered to the sandbox workspace
// (push model, ADR-0017). MinIO/object storage is the source of truth; the
// gateway uploads every file to a bucket and, by a configurable size threshold
// (COCOLA_ATTACHMENT_INLINE_MAX_BYTES, default 16MiB), decides delivery:
//   - small files: `content` carries the raw bytes inline (agent-runtime writes
//     them straight into ./uploads/); `oss_key` is still set for history/replay.
//   - large files: `content` is empty and only `oss_key` (+ `size`) travel; the
//     agent-runtime back-end pulls the bytes from object storage before the run.
// Either way the model just reads a local file — no agent-side tool involved.
message Attachment {
  string filename = 1;  // sanitized basename; landed under ./uploads/ in the workspace
  bytes content = 2;    // raw file bytes; empty when the file is delivered via oss_key
  string mime = 3;      // best-effort MIME type from the browser
  string oss_key = 4;   // object-storage key (source of truth); set for every upload
  int64 size = 5;       // original byte length; drives threshold + logging
}

message AgentEvent {
  string kind = 1;         // text | tool_use | tool_result | error | done | ...
  map<string, string> data = 2;  // simple key/value payload; complex payloads land in M2
}

message ReleaseSessionRequest {
  string user_id = 1;
  string session_id = 2;
}

message ReleaseSessionResponse {}

message ListRuntimesRequest {}

message Runtime {
  string id = 1;
  string label = 2;
  string model_protocol = 3;
  bool is_default = 4;
}

message ListRuntimesResponse {
  repeated Runtime runtimes = 1;
}
