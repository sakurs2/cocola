version: v2
# Local Go plugins are used instead of buf's remote plugins because the
# corporate TLS intercept blocks buf.build's remote plugin registry. Install
# the binaries via `make proto-tools`. Python stubs are generated separately
# via grpc_tools.protoc (see Makefile proto-gen-py).
plugins:
  - local: protoc-gen-go
    out: gen/go
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen/go
    opt: paths=source_relative,require_unimplemented_servers=true
