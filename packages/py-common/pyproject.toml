[project]
name = "cocola-common"
version = "0.0.1"
description = "Shared Python primitives for cocola services."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "structlog>=24.1",
    "prometheus-client>=0.20",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["cocola_common"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
