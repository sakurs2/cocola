version: 2

project_name: cocola

builds:
  - id: cocola
    dir: apps/cli
    main: ./cmd/cocola
    binary: cocola
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X github.com/cocola-project/cocola/apps/cli/internal/version.Version={{ .Version }}
        -X github.com/cocola-project/cocola/apps/cli/internal/version.Commit={{ .Commit }}
        -X github.com/cocola-project/cocola/apps/cli/internal/version.Date={{ .Date }}

archives:
  - ids: [cocola]
    formats: [tar.gz]
    name_template: "cocola_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
