# golangci-lint config for cocola Go modules.
# Run: make go-lint  (or: golangci-lint run ./...)
# Not run on every commit by default (slow); wired into Make/CI instead.
run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive

issues:
  exclude-dirs:
    - gen
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
