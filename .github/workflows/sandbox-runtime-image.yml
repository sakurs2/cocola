name: sandbox-runtime-image

on:
  workflow_dispatch:
    inputs:
      extra_tag:
        description: "Optional extra image tag, e.g. v0.1.0-rc.1"
        required: false
        type: string
  push:
    branches: [master]
    paths:
      - ".github/workflows/sandbox-runtime-image.yml"
      - "deploy/sandbox-runtime/**"
      - "scripts/sandbox-runtime-verify.sh"

permissions:
  contents: read
  packages: write

concurrency:
  group: sandbox-runtime-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cocola-sandbox-runtime

jobs:
  build-and-push:
    name: build + push sandbox runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=dev,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ inputs.extra_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.extra_tag != '' }}

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: deploy/sandbox-runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Verify pushed image selfcheck
        run: |
          set -euo pipefail
          image="${IMAGE_NAME}@${DIGEST}"
          self="$(docker run --rm --platform linux/amd64 "$image" /opt/cocola/shim/entrypoint.sh --selfcheck)"
          echo "$self"
          SELF="$self" python3 - <<'PY'
          import json
          import os
          import sys

          data = json.loads(os.environ["SELF"])
          tools = [
              "node",
              "claude_cli",
              "claude_agent_sdk",
              "pnpm",
              "yarn",
              "playwright",
              "chromium",
              "fd",
              "jq",
              "yq",
              "tree",
              "file",
              "make",
              "imagemagick",
              "pdftotext",
              "rsvg_convert",
          ]
          failed = [
              tool
              for tool in tools
              if str(data.get(tool, "")).startswith(("missing", "error:"))
          ]
          if failed:
              print("failed selfcheck tools:", ", ".join(failed), file=sys.stderr)
              sys.exit(1)
          PY
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Summary
        run: |
          {
            echo "### sandbox-runtime image"
            echo
            echo "- Image: \`${IMAGE_NAME}\`"
            echo "- Digest: \`${DIGEST}\`"
            echo
            echo "Use this digest-pinned reference in production:"
            echo
            echo "\`\`\`text"
            echo "${IMAGE_NAME}@${DIGEST}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
