name: proto-breaking

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/proto/**"

jobs:
  breaking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
      - name: buf breaking
        working-directory: packages/proto
        run: buf breaking --against ".git#branch=main"
