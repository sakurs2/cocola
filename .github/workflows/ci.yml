name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR — saves minutes when pushing rapidly.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------ proto
  proto:
    name: proto / buf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: bufbuild/buf-action@v1
        with:
          version: "1.35.1"
          setup_only: true
      - name: buf lint
        working-directory: packages/proto
        run: buf lint

  # ------------------------------------------------------------------ go
  go:
    name: go / build + test + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true
      - name: go vet (workspace)
        run: go vet ./apps/admin-api/... ./apps/gateway/... ./apps/cli/... ./db/... ./packages/go-common/... ./packages/proto/gen/go/...
      - name: go test (workspace)
        run: go test ./apps/admin-api/... ./apps/gateway/... ./apps/cli/... ./db/... ./packages/go-common/... ./packages/proto/gen/go/...
      - name: install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
      - name: golangci-lint
        run: "$(go env GOPATH)/bin/golangci-lint run --timeout=5m ./apps/admin-api/... ./apps/gateway/... ./apps/cli/... ./db/... ./packages/go-common/... ./packages/proto/gen/go/..."

  # ------------------------------------------------------------------ python
  python:
    name: python / ruff + pytest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [agent-runtime, llm-gateway]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: install uv
        run: pip install uv
      - name: install deps
        working-directory: apps/${{ matrix.app }}
        run: uv sync --all-extras
      - name: ruff
        run: |
          pip install ruff
          ruff check apps/${{ matrix.app }} packages/py-common
      - name: pytest
        working-directory: apps/${{ matrix.app }}
        run: uv run pytest -q

  # ------------------------------------------------------------------ web
  web:
    name: web / build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @cocola/web lint
      - run: pnpm --filter @cocola/web build
