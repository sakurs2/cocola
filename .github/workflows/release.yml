name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  validate:
    name: validate release version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate semantic version and ordering
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: git tag --list 'v*' | python3 scripts/validate_release_version.py "$RELEASE_TAG"
      - name: Reject an already published release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.setFailed(`release ${tag} already exists`);
            } catch (error) {
              if (error.status !== 404) throw error;
            }

  images:
    name: image / ${{ matrix.name }}
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gateway
            dockerfile: apps/gateway/Dockerfile
            context: .
          - name: admin-api
            dockerfile: apps/admin-api/Dockerfile
            context: .
          - name: agent-runtime
            dockerfile: apps/agent-runtime/Dockerfile
            context: .
          - name: llm-gateway
            dockerfile: apps/llm-gateway/Dockerfile
            context: .
          - name: sandbox-manager
            dockerfile: apps/sandbox-manager/Dockerfile
            context: .
          - name: web
            dockerfile: apps/web/Dockerfile
            context: .
          - name: sandbox-runtime
            dockerfile: deploy/sandbox-runtime/Dockerfile
            context: deploy/sandbox-runtime
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cocola-${{ matrix.name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          sbom: true
          provenance: mode=max
      - name: Verify sandbox runtime
        if: matrix.name == 'sandbox-runtime'
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/cocola-sandbox-runtime@${{ steps.build.outputs.digest }}
        run: |
          output="$(docker run --rm --platform linux/amd64 "$IMAGE" /opt/cocola/shim/entrypoint.sh --selfcheck)"
          echo "$output"
          SELF="$output" python3 - <<'PY'
          import json
          import os

          data = json.loads(os.environ["SELF"])
          required = ["node", "claude_cli", "claude_agent_sdk", "chromium", "make"]
          failed = [name for name in required if str(data.get(name, "")).startswith(("missing", "error:"))]
          if failed:
              raise SystemExit("sandbox runtime selfcheck failed: " + ", ".join(failed))
          PY

  cli:
    name: cli binaries
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Test CLI
        working-directory: apps/cli
        run: go test ./...
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
