# Local OpenSandbox server for the OpenSandbox SandboxProvider e2e harness.
#
# This stands up the *device under test* — an OpenSandbox FastAPI server on
# :8090 with the Docker runtime — so `cmd/opensandbox-verify` has something real
# to talk to. It reuses the upstream `opensandbox/server` image (no fork, no
# rebuild); execd/egress sidecar images are pulled on demand by the server.
#
# Usage:
#   make opensandbox-up            # start server, wait for /health
#   make verify-opensandbox-full   # up + run harness + (server stays up)
#   make opensandbox-down          # stop & remove
#
# Auth is OFF by default (api_key unset) so the harness needs no API key. To
# exercise auth, set [server].api_key below AND export COCOLA_OPENSANDBOX_API_KEY
# to the same value before running the harness.

name: cocola-opensandbox

services:
  opensandbox-server:
    image: opensandbox/server:latest
    container_name: cocola-opensandbox-server
    restart: unless-stopped
    ports:
      # Host port is parameterized so this can coexist with other stacks. The
      # in-container port stays 8090 (see [server].port below). Point the
      # provider at host.docker.internal:${COCOLA_OPENSANDBOX_HOST_PORT}/v1.
      - "${COCOLA_OPENSANDBOX_HOST_PORT:-8090}:8090"
    volumes:
      # Docker runtime drives sandboxes as sibling containers on the host daemon.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SANDBOX_CONFIG_PATH=/etc/opensandbox/config.toml
      # api_key is empty -> server refuses to start insecure unless we ack it.
      - OPENSANDBOX_INSECURE_SERVER=YES
    configs:
      - source: opensandbox-config
        target: /etc/opensandbox/config.toml
    healthcheck:
      # /health is exempt from auth (see server middleware/auth.py EXEMPT_PATHS).
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8090/health').status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 20

configs:
  opensandbox-config:
    content: |
      [server]
      host = "0.0.0.0"
      port = 8090
      # api_key = "change-me"   # uncomment to enable auth; then export
      #                         # COCOLA_OPENSANDBOX_API_KEY to the same value.

      [log]
      level = "INFO"

      [runtime]
      type = "docker"
      execd_image = "sandbox-registry.cn-zhangjiakou.cr.aliyuncs.com/opensandbox/execd:v1.0.19"

      [egress]
      image = "opensandbox/egress:v1.1.2"

      [docker]
      network_mode = "bridge"
      # Server runs in a container, so sandbox bridge endpoints must be reached
      # via the host. host.docker.internal resolves to the host on Docker Desktop.
      host_ip = "host.docker.internal"
      drop_capabilities = ["AUDIT_WRITE", "MKNOD", "NET_ADMIN", "NET_RAW", "SYS_ADMIN", "SYS_MODULE", "SYS_PTRACE", "SYS_TIME", "SYS_TTY_CONFIG"]
      no_new_privileges = true
      pids_limit = 4096

      [ingress]
      mode = "direct"
