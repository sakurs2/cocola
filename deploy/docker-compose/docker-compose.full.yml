# cocola full stack: all service nodes containerised (RocketMQ-style).
#
# One command brings up the entire control plane + data plane:
#   docker compose -f deploy/docker-compose/docker-compose.full.yml up -d
#
# Topology:
#   web -> gateway -> agent-runtime -> {sandbox-manager, llm-gateway, admin-api}
#   admin-api / llm-gateway <-> redis (revokes, quota, billing)
#   sandbox-manager -> host docker daemon (DooD) to create user sandboxes
#
# Auth.js protects the web app; admin-api owns the whitelist and runtime token
# signing. For production inject AUTH_SECRET, COCOLA_ADMIN_KEY,
# COCOLA_AUTH_SECRET, and bootstrap admin env vars from your secret manager.
# The agent runs Route A (ADR-0009): the Claude Code brain lives inside the
# user's sandbox (COCOLA_SANDBOX_ADDR is set below); with no sandbox it degrades
# to EchoProvider.
#
# DooD path isomorphism (see m-minimal plan): COCOLA_SANDBOX_ROOT must be the
# SAME absolute path inside sandbox-manager and on the host, so the host daemon
# resolves the user-sandbox bind mounts. Mounted source==target below.

name: cocola

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${COCOLA_REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cocola
      POSTGRES_PASSWORD: cocola_dev_pw
      POSTGRES_DB: cocola
    ports:
      - "${COCOLA_PG_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cocola -d cocola"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${COCOLA_MINIO_ROOT_USER:-cocola}"
      MINIO_ROOT_PASSWORD: "${COCOLA_MINIO_ROOT_PASSWORD:-cocola_dev_pw}"
    ports:
      - "${COCOLA_MINIO_API_HOST_PORT:-9000}:9000" # S3 API
      - "${COCOLA_MINIO_CONSOLE_HOST_PORT:-9001}:9001" # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # MinIO bucket bootstrap — runs once, creates the attachments bucket.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 ${COCOLA_MINIO_ROOT_USER:-cocola} ${COCOLA_MINIO_ROOT_PASSWORD:-cocola_dev_pw} &&
      mc mb --ignore-existing local/${COCOLA_MINIO_BUCKET:-cocola}
      "

  sandbox-manager:
    build:
      context: ../..
      dockerfile: apps/sandbox-manager/Dockerfile
    image: cocola/sandbox-manager:dev
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      COCOLA_SANDBOX_ADDR: ":50051"
      # Sandbox backend (ADR-0013/0014): "docker" (default, DooD on the host
      # daemon) or "opensandbox" (talks to an OpenSandbox server). Override via
      # repo-root .env. When opensandbox, the server is NOT on this compose
      # network -- it is published on the host -- so point the URL at
      # host.docker.internal:<host_port>/v1 (note the /v1 suffix).
      COCOLA_SANDBOX_PROVIDER: "${COCOLA_SANDBOX_PROVIDER:-docker}"
      COCOLA_OPENSANDBOX_URL: "${COCOLA_OPENSANDBOX_URL:-}"
      COCOLA_OPENSANDBOX_API_KEY: "${COCOLA_OPENSANDBOX_API_KEY:-}"
      COCOLA_OPENSANDBOX_DEFAULT_CPU: "${COCOLA_OPENSANDBOX_DEFAULT_CPU:-}"
      COCOLA_OPENSANDBOX_DEFAULT_MEMORY: "${COCOLA_OPENSANDBOX_DEFAULT_MEMORY:-}"
      COCOLA_OPENSANDBOX_DIRECT_EXEC: "${COCOLA_OPENSANDBOX_DIRECT_EXEC:-}"
      COCOLA_REDIS_ADDR: "redis:6379"
      COCOLA_SANDBOX_ROOT: "${COCOLA_DATA_ROOT:-/var/lib/cocola/sandboxes}"
      COCOLA_SANDBOX_VOLUME_BACKEND: "${COCOLA_SANDBOX_VOLUME_BACKEND:-}"
      # Egress hardening (ADR-0009). sandbox-manager reads these to build each
      # sandbox's firewall allowlist: the llm-gateway host is auto-folded in from
      # COCOLA_SANDBOX_LLM_BASE_URL so Route A can always reach the gateway; any
      # extra domains/CIDRs the agent needs go in COCOLA_SANDBOX_EGRESS_ALLOWLIST
      # (comma-separated). Setting these switches every sandbox to default-deny +
      # allowlist; leaving COCOLA_SANDBOX_EGRESS_ALLOWLIST unset still installs
      # the DNS+gateway baseline (secure by default).
      COCOLA_SANDBOX_LLM_BASE_URL: "${COCOLA_SANDBOX_LLM_BASE_URL:-http://host.docker.internal:18091}"
      COCOLA_SANDBOX_EGRESS_ALLOWLIST: "${COCOLA_SANDBOX_EGRESS_ALLOWLIST:-}"
    ports:
      - "${COCOLA_SANDBOX_HOST_PORT:-50051}:50051"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # COCOLA_DATA_ROOT holds session storage:
      # <root>/users/<user>/sessions/<session>/{workspace,claude}. Bind the same
      # absolute path into sandbox-manager so Docker/OpenSandbox host volumes are
      # path-isomorphic with the host daemon. Point it at NFS/NAS in production.
      - "${COCOLA_DATA_ROOT:-/var/lib/cocola/sandboxes}:${COCOLA_DATA_ROOT:-/var/lib/cocola/sandboxes}"

  llm-gateway:
    build:
      context: ../..
      dockerfile: apps/llm-gateway/Dockerfile
    image: cocola/llm-gateway:dev
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      COCOLA_LLM_HOST: "0.0.0.0"
      COCOLA_LLM_PORT: "8080"
      COCOLA_LLM_REDIS_URL: "redis://redis:6379/0"
      # Real model: provider + endpoint + key + model come from the repo-root
      # .env via compose substitution. Default to "fake" so a bare `up` (no
      # --env-file) still boots zero-config. We deliberately do NOT forward
      # COCOLA_AUTH_SECRET here: that would switch gateway auth ON and break the
      # dev anonymous-token flow; auth enablement is a separate milestone.
      COCOLA_LLM_PROVIDER: "${COCOLA_LLM_PROVIDER:-fake}"
      COCOLA_LLM_DEFAULT_ALIAS: "cocola-default"
      COCOLA_ANTHROPIC_BASE_URL: "${COCOLA_ANTHROPIC_BASE_URL:-}"
      COCOLA_ANTHROPIC_API_KEY: "${COCOLA_ANTHROPIC_API_KEY:-}"
      COCOLA_ANTHROPIC_MODEL: "${COCOLA_ANTHROPIC_MODEL:-}"
      # M7 persistence: when COCOLA_PG_DSN is set the service persists to
      # Postgres; unset -> in-memory (zero-dep dev boot). Full stack ships
      # a postgres node, so we default the DSN to it.
      COCOLA_PG_DSN: "${COCOLA_PG_DSN:-postgres://cocola:cocola_dev_pw@postgres:5432/cocola?sslmode=disable}"
    ports:
      - "${COCOLA_LLM_HOST_PORT:-18091}:8080" # host 18091; avoids clash with gateway (8080) and any stray :8081 listener
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8080/healthz').status==200 else sys.exit(1)",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  admin-api:
    build:
      context: ../..
      dockerfile: apps/admin-api/Dockerfile
    image: cocola/admin-api:dev
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      COCOLA_ADMIN_ADDR: ":8090"
      COCOLA_REDIS_ADDR: "redis:6379"
      COCOLA_ADMIN_KEY: "${COCOLA_ADMIN_KEY:-}"
      COCOLA_AUTH_SECRET: "${COCOLA_AUTH_SECRET:-}"
      COCOLA_BOOTSTRAP_ADMIN_USERNAME: "${COCOLA_BOOTSTRAP_ADMIN_USERNAME:-}"
      COCOLA_BOOTSTRAP_ADMIN_EMAIL: "${COCOLA_BOOTSTRAP_ADMIN_EMAIL:-}"
      COCOLA_BOOTSTRAP_ADMIN_PASSWORD: "${COCOLA_BOOTSTRAP_ADMIN_PASSWORD:-}"
      COCOLA_BOOTSTRAP_ADMIN_PASSWORD_HASH: "${COCOLA_BOOTSTRAP_ADMIN_PASSWORD_HASH:-}"
      COCOLA_BOOTSTRAP_ADMIN_RESET: "${COCOLA_BOOTSTRAP_ADMIN_RESET:-}"
      # M7 persistence: DSN set -> Postgres repository; unset -> in-memory.
      COCOLA_PG_DSN: "${COCOLA_PG_DSN:-postgres://cocola:cocola_dev_pw@postgres:5432/cocola?sslmode=disable}"
    ports:
      # Host port defaults to 8092 (NOT 8090) so the full stack can run alongside
      # docker-compose.opensandbox.yml, whose OpenSandbox server owns host :8090.
      # The in-container port stays :8090; agent-runtime reaches it by service
      # name (http://admin-api:8090), so this remap is host-side only.
      - "${COCOLA_ADMIN_HOST_PORT:-8092}:8090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  agent-runtime:
    build:
      context: ../..
      dockerfile: apps/agent-runtime/Dockerfile
    image: cocola/agent-runtime:dev
    restart: unless-stopped
    depends_on:
      sandbox-manager:
        condition: service_started
      llm-gateway:
        condition: service_healthy
      admin-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      COCOLA_AGENT_HOST: "0.0.0.0"
      COCOLA_AGENT_PORT: "50061"
      COCOLA_SANDBOX_ADDR: "sandbox-manager:50051"
      COCOLA_ADMIN_BASE_URL: "http://admin-api:8090"
      # Route A (ADR-0009): the agent-runtime slim image has no node/claude CLI,
      # so the Claude Code brain runs INSIDE the user's sandbox (the
      # cocola/sandbox-runtime image, which bakes node + claude + the shim).
      # agent-runtime is then a pure control-plane router. Route A activates
      # automatically because COCOLA_SANDBOX_ADDR (above) is set; there is no
      # separate route switch (the legacy Route B was decommissioned).
      # The session sandbox is created from the brain image and gets the model
      # credentials injected at creation (never via the prompt). The in-sandbox
      # claude CLI reaches the gateway over the HOST-published port: sandboxes
      # are created by sandbox-manager via DooD on the host daemon, so they land
      # on the host bridge, not this compose network. host.docker.internal:18091
      # -> llm-gateway:8080. ANTHROPIC_AUTH_TOKEN is a dev token (gateway auth
      # is off); ANTHROPIC_MODEL resolves to the gateway's default alias.
      COCOLA_SANDBOX_IMAGE: "${COCOLA_SANDBOX_IMAGE:-cocola/sandbox-runtime:dev}"
      COCOLA_SANDBOX_LLM_BASE_URL: "${COCOLA_SANDBOX_LLM_BASE_URL:-http://host.docker.internal:18091}"
      COCOLA_SANDBOX_LLM_TOKEN: "${COCOLA_SANDBOX_LLM_TOKEN:-cocola-local}"
      COCOLA_SANDBOX_MODEL_ALIAS: "${COCOLA_SANDBOX_MODEL_ALIAS:-cocola-default}"
      # M7 persistence: session_map persists to Postgres when DSN set;
      # unset -> in-process map (lost on restart).
      COCOLA_PG_DSN: "${COCOLA_PG_DSN:-postgres://cocola:cocola_dev_pw@postgres:5432/cocola?sslmode=disable}"
      # Attachment object store (ADR-0017 P1a). agent-runtime pulls large
      # (key-only) attachments from MinIO on the model's behalf before a run.
      # Same COCOLA_MINIO_* naming as the gateway (the uploader). Endpoint is the
      # in-network host:port (no scheme); SSL off inside the compose network.
      # Unset endpoint/bucket -> no fetcher; a key-only attachment then surfaces
      # as a clean provisioning error.
      COCOLA_MINIO_ENDPOINT: "${COCOLA_MINIO_ENDPOINT:-minio:9000}"
      COCOLA_MINIO_ACCESS_KEY: "${COCOLA_MINIO_ROOT_USER:-cocola}"
      COCOLA_MINIO_SECRET_KEY: "${COCOLA_MINIO_ROOT_PASSWORD:-cocola_dev_pw}"
      COCOLA_MINIO_BUCKET: "${COCOLA_MINIO_BUCKET:-cocola}"
      COCOLA_MINIO_USE_SSL: "${COCOLA_MINIO_USE_SSL:-}"
    ports:
      - "${COCOLA_AGENT_HOST_PORT:-50061}:50061"

  gateway:
    build:
      context: ../..
      dockerfile: apps/gateway/Dockerfile
    image: cocola/gateway:dev
    restart: unless-stopped
    depends_on:
      agent-runtime:
        condition: service_started
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      COCOLA_GATEWAY_ADDR: ":8080"
      COCOLA_AGENT_ADDR: "agent-runtime:50061"
      COCOLA_AUTH_SECRET: "${COCOLA_AUTH_SECRET:-}"
      COCOLA_AUTH_ALLOW_ANON: "${COCOLA_AUTH_ALLOW_ANON:-0}"
      # Conversation persistence (route A): the gateway mirrors each turn's
      # rendered parts into Postgres so the sidebar can list past conversations
      # and clicking one replays its history. Set -> persist; unset -> feature
      # dark (chat still works, nothing is stored). Full stack ships a postgres
      # node, so default the DSN to it (same value as the other services).
      COCOLA_PG_DSN: "${COCOLA_PG_DSN:-postgres://cocola:cocola_dev_pw@postgres:5432/cocola?sslmode=disable}"
      # Attachment object store (ADR-0017 P1a): the gateway is the uploader --
      # every attachment is PutObject'd to MinIO (source of truth), then split by
      # threshold. Small (<= COCOLA_ATTACHMENT_INLINE_MAX_BYTES, default 16MiB)
      # ship inline + oss_key; large ship oss_key-only for agent-runtime to pull.
      # Unset endpoint/bucket -> gateway stays on P0 inline-only (feature dark).
      COCOLA_MINIO_ENDPOINT: "${COCOLA_MINIO_ENDPOINT:-minio:9000}"
      COCOLA_MINIO_ACCESS_KEY: "${COCOLA_MINIO_ROOT_USER:-cocola}"
      COCOLA_MINIO_SECRET_KEY: "${COCOLA_MINIO_ROOT_PASSWORD:-cocola_dev_pw}"
      COCOLA_MINIO_BUCKET: "${COCOLA_MINIO_BUCKET:-cocola}"
      COCOLA_MINIO_USE_SSL: "${COCOLA_MINIO_USE_SSL:-}"
      COCOLA_ATTACHMENT_INLINE_MAX_BYTES: "${COCOLA_ATTACHMENT_INLINE_MAX_BYTES:-}"
    ports:
      - "${COCOLA_GATEWAY_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    image: cocola/web:dev
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
      admin-api:
        condition: service_healthy
    environment:
      NODE_ENV: "production"
      # The browser talks to the gateway; expose its public URL to the app.
      NEXT_PUBLIC_GATEWAY_URL: "http://localhost:8080"
      # Hard ceiling on a single attachment carried inline over the browser->
      # gateway JSON hop (ADR-0017). NOT the small/large split threshold -- the
      # gateway splits by COCOLA_ATTACHMENT_INLINE_MAX_BYTES and backend-pulls
      # large ones. Default 32MiB (> the 16MiB split, so both paths are UI-
      # reachable). NEXT_PUBLIC_ is inlined at build time, so override here only
      # takes effect on a rebuild.
      NEXT_PUBLIC_ATTACHMENT_MAX_BYTES: "${NEXT_PUBLIC_ATTACHMENT_MAX_BYTES:-33554432}"
      # The web server-side SSE proxy (app/api/chat/route.ts) calls the gateway
      # from INSIDE the compose network, so it must use the service name, not
      # 127.0.0.1 (which would resolve to the web container itself).
      COCOLA_GATEWAY_URL: "http://gateway:8080"
      COCOLA_ADMIN_URL: "http://admin-api:8090"
      COCOLA_ADMIN_KEY: "${COCOLA_ADMIN_KEY:-}"
      AUTH_SECRET: "${AUTH_SECRET:-}"
    ports:
      - "${COCOLA_WEB_HOST_PORT:-3000}:3000"

volumes:
  redisdata:
  pgdata:
  miniodata:
