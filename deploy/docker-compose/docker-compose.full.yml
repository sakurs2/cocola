# cocola full stack: all service nodes containerised (RocketMQ-style).
#
# One command brings up the entire control plane + data plane:
#   docker compose -f deploy/docker-compose/docker-compose.full.yml up -d
#
# Topology:
#   web -> gateway -> agent-runtime -> {sandbox-manager, llm-gateway, admin-api}
#   admin-api / llm-gateway <-> redis (revokes, quota, billing)
#   sandbox-manager -> host docker daemon (DooD) to create user sandboxes
#
# Dev defaults: auth is OFF (no COCOLA_AUTH_SECRET / COCOLA_ADMIN_KEY) and the
# agent uses EchoProvider (no COCOLA_LLM_BASE_URL) so the stack runs zero-config.
# Flip to production by injecting those env vars -- no code change.
#
# DooD path isomorphism (see m-minimal plan): COCOLA_SANDBOX_ROOT must be the
# SAME absolute path inside sandbox-manager and on the host, so the host daemon
# resolves the user-sandbox bind mounts. Mounted source==target below.

name: cocola

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cocola
      POSTGRES_PASSWORD: cocola_dev_pw
      POSTGRES_DB: cocola
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cocola -d cocola"]
      interval: 5s
      timeout: 3s
      retries: 10

  sandbox-manager:
    build:
      context: ../..
      dockerfile: apps/sandbox-manager/Dockerfile
    image: cocola/sandbox-manager:dev
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      COCOLA_SANDBOX_ADDR: ":50051"
      COCOLA_SANDBOX_PROVIDER: "docker"
      COCOLA_REDIS_ADDR: "redis:6379"
      COCOLA_SANDBOX_ROOT: "${COCOLA_DATA_ROOT:-/var/lib/cocola/sandboxes}"
      # Egress hardening (ADR-0009). sandbox-manager reads these to build each
      # sandbox's firewall allowlist: the llm-gateway host is auto-folded in from
      # COCOLA_SANDBOX_LLM_BASE_URL so Route A can always reach the gateway; any
      # extra domains/CIDRs the agent needs go in COCOLA_SANDBOX_EGRESS_ALLOWLIST
      # (comma-separated). Setting these switches every sandbox to default-deny +
      # allowlist; leaving COCOLA_SANDBOX_EGRESS_ALLOWLIST unset still installs
      # the DNS+gateway baseline (secure by default).
      COCOLA_SANDBOX_LLM_BASE_URL: "${COCOLA_SANDBOX_LLM_BASE_URL:-http://host.docker.internal:18091}"
      COCOLA_SANDBOX_EGRESS_ALLOWLIST: "${COCOLA_SANDBOX_EGRESS_ALLOWLIST:-}"
    ports:
      - "50051:50051"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # COCOLA_DATA_ROOT holds every per-session/per-user sandbox volume,
      # including <root>/claude/<user_id> which is bind-mounted into each Route A
      # sandbox at /home/cocola/.claude (CLAUDE_CONFIG_DIR). That on-disk Claude
      # session store is the SUFFICIENT condition for --resume to survive a
      # sandbox recreation (M7, ADR-0008 T2); the session_map table in Postgres
      # is only the index that says which claude_session_id to resume.
      - "${COCOLA_DATA_ROOT:-/var/lib/cocola/sandboxes}:${COCOLA_DATA_ROOT:-/var/lib/cocola/sandboxes}"

  llm-gateway:
    build:
      context: ../..
      dockerfile: apps/llm-gateway/Dockerfile
    image: cocola/llm-gateway:dev
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      COCOLA_LLM_HOST: "0.0.0.0"
      COCOLA_LLM_PORT: "8080"
      COCOLA_LLM_REDIS_URL: "redis://redis:6379/0"
      # Real model: provider + endpoint + key + model come from the repo-root
      # .env via compose substitution. Default to "fake" so a bare `up` (no
      # --env-file) still boots zero-config. We deliberately do NOT forward
      # COCOLA_AUTH_SECRET here: that would switch gateway auth ON and break the
      # dev anonymous-token flow; auth enablement is a separate milestone.
      COCOLA_LLM_PROVIDER: "${COCOLA_LLM_PROVIDER:-fake}"
      COCOLA_LLM_DEFAULT_ALIAS: "cocola-default"
      COCOLA_ANTHROPIC_BASE_URL: "${COCOLA_ANTHROPIC_BASE_URL:-}"
      COCOLA_ANTHROPIC_API_KEY: "${COCOLA_ANTHROPIC_API_KEY:-}"
      COCOLA_ANTHROPIC_MODEL: "${COCOLA_ANTHROPIC_MODEL:-}"
      # M7 persistence: when COCOLA_PG_DSN is set the service persists to
      # Postgres; unset -> in-memory (zero-dep dev boot). Full stack ships
      # a postgres node, so we default the DSN to it.
      COCOLA_PG_DSN: "${COCOLA_PG_DSN:-postgres://cocola:cocola_dev_pw@postgres:5432/cocola?sslmode=disable}"
    ports:
      - "18091:8080"  # host 18091; avoids clash with gateway (8080) and any stray :8081 listener
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8080/healthz').status==200 else sys.exit(1)"]
      interval: 5s
      timeout: 3s
      retries: 20

  admin-api:
    build:
      context: ../..
      dockerfile: apps/admin-api/Dockerfile
    image: cocola/admin-api:dev
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      COCOLA_ADMIN_ADDR: ":8090"
      COCOLA_REDIS_ADDR: "redis:6379"
      # COCOLA_ADMIN_KEY / COCOLA_AUTH_SECRET unset -> dev mode (auth off).
      # M7 persistence: DSN set -> Postgres repository; unset -> in-memory.
      COCOLA_PG_DSN: "${COCOLA_PG_DSN:-postgres://cocola:cocola_dev_pw@postgres:5432/cocola?sslmode=disable}"
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  agent-runtime:
    build:
      context: ../..
      dockerfile: apps/agent-runtime/Dockerfile
    image: cocola/agent-runtime:dev
    restart: unless-stopped
    depends_on:
      sandbox-manager:
        condition: service_started
      llm-gateway:
        condition: service_healthy
      admin-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      COCOLA_AGENT_HOST: "0.0.0.0"
      COCOLA_AGENT_PORT: "50061"
      COCOLA_SANDBOX_ADDR: "sandbox-manager:50051"
      COCOLA_ADMIN_BASE_URL: "http://admin-api:8090"
      # Route A (ADR-0009): the agent-runtime slim image has no node/claude CLI,
      # so the Claude Code brain runs INSIDE the user's sandbox (the
      # cocola/sandbox-runtime image, which bakes node + claude + the shim).
      # agent-runtime is then a pure control-plane router.
      COCOLA_AGENT_ROUTE: "${COCOLA_AGENT_ROUTE:-A}"
      # The session sandbox is created from the brain image and gets the model
      # credentials injected at creation (never via the prompt). The in-sandbox
      # claude CLI reaches the gateway over the HOST-published port: sandboxes
      # are created by sandbox-manager via DooD on the host daemon, so they land
      # on the host bridge, not this compose network. host.docker.internal:18091
      # -> llm-gateway:8080. ANTHROPIC_AUTH_TOKEN is a dev token (gateway auth
      # is off); ANTHROPIC_MODEL resolves to the gateway's default alias.
      COCOLA_SANDBOX_IMAGE: "${COCOLA_SANDBOX_IMAGE:-cocola/sandbox-runtime:dev}"
      COCOLA_SANDBOX_LLM_BASE_URL: "${COCOLA_SANDBOX_LLM_BASE_URL:-http://host.docker.internal:18091}"
      COCOLA_SANDBOX_LLM_TOKEN: "${COCOLA_SANDBOX_LLM_TOKEN:-cocola-local}"
      COCOLA_SANDBOX_MODEL_ALIAS: "${COCOLA_SANDBOX_MODEL_ALIAS:-cocola-default}"
      # M7 persistence: session_map persists to Postgres when DSN set;
      # unset -> in-process map (lost on restart).
      COCOLA_PG_DSN: "${COCOLA_PG_DSN:-postgres://cocola:cocola_dev_pw@postgres:5432/cocola?sslmode=disable}"
    ports:
      - "50061:50061"

  gateway:
    build:
      context: ../..
      dockerfile: apps/gateway/Dockerfile
    image: cocola/gateway:dev
    restart: unless-stopped
    depends_on:
      agent-runtime:
        condition: service_started
    environment:
      COCOLA_GATEWAY_ADDR: ":8080"
      COCOLA_AGENT_ADDR: "agent-runtime:50061"
      COCOLA_AUTH_ALLOW_ANON: "1"   # dev: accept blank tokens as dev-user
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    image: cocola/web:dev
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      NODE_ENV: "production"
      # The browser talks to the gateway; expose its public URL to the app.
      NEXT_PUBLIC_GATEWAY_URL: "http://localhost:8080"
      # The web server-side SSE proxy (app/api/chat/route.ts) calls the gateway
      # from INSIDE the compose network, so it must use the service name, not
      # 127.0.0.1 (which would resolve to the web container itself).
      COCOLA_GATEWAY_URL: "http://gateway:8080"
    ports:
      - "3000:3000"

volumes:
  redisdata:
  pgdata:
