# cocola M-minimal vertical slice: control plane + sandbox + persistent volume,
# fully containerised (RocketMQ-style "up and it runs").
#
# This brings up the control plane (sandbox-manager) and its only hard
# dependency (redis, for session<->sandbox binding). The control plane then
# `docker run`s user sandboxes on the HOST docker daemon (DooD via the mounted
# docker.sock).
#
# Usage:
#   docker compose -f deploy/docker-compose/docker-compose.yml up -d
#   # then drive it:
#   go run ./apps/sandbox-manager/cmd/sandbox-cli -addr :50051 demo
#
# DooD path isomorphism (critical):
#   sandbox-manager runs in a container but bind-mounts host dirs into the user
#   sandboxes it creates. Those Source paths are resolved by the HOST daemon, so
#   the volume root MUST be the SAME absolute path inside this container and on
#   the host. We achieve that by mounting ${COCOLA_DATA_ROOT} at the identical
#   target and setting COCOLA_SANDBOX_ROOT to it.

name: cocola-minimal

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  sandbox-manager:
    build:
      context: ../..
      dockerfile: apps/sandbox-manager/Dockerfile
    image: cocola/sandbox-manager:dev
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      COCOLA_SANDBOX_ADDR: ":50051"
      COCOLA_SANDBOX_PROVIDER: "docker"
      COCOLA_REDIS_ADDR: "redis:6379"
      # Path isomorphism: identical absolute path on host and in-container.
      COCOLA_SANDBOX_ROOT: "${COCOLA_DATA_ROOT:-/var/lib/cocola/sandboxes}"
    ports:
      - "50051:50051"
    volumes:
      # DooD: talk to the host docker daemon to create user sandboxes.
      - /var/run/docker.sock:/var/run/docker.sock
      # Volume root, mounted at the IDENTICAL path (source == target) so the
      # host daemon resolves sandbox bind-mounts correctly.
      - "${COCOLA_DATA_ROOT:-/var/lib/cocola/sandboxes}:${COCOLA_DATA_ROOT:-/var/lib/cocola/sandboxes}"

volumes:
  redisdata:
