# Vault 机密注入(可选叠加层) —— ADR-0008 §5「Secrets via Vault, using mature
# integrations (no custom crypto)」。
#
# 设计要点(与 S1 的 *_FILE 缝口配套):
#   - 复用 HashiCorp Vault Agent Injector(成熟集成),不给应用塞 Vault SDK。
#   - Vault Agent Sidecar 把 secret/cocola/platform/* 渲染成文件到
#     /vault/secrets/*,再用 COCOLA_*_FILE 指向它;应用经 S1 的 SecretFromEnv /
#     read_secret_env 读文件,零感知 Vault。
#   - 不启用 Vault 时,原生 secretKeyRef(05-deps-redis-llm-gateway.yaml)仍是
#     回落路径 —— 二选一,互不冲突。
#
# 前置(集群侧,本清单不含):
#   1) 已装 Vault + Vault Agent Injector(helm: hashicorp/vault,injector.enabled=true)。
#   2) 已启用 Kubernetes auth:vault auth enable kubernetes。
#   3) 已写入机密与 policy(见本文件末尾 ConfigMap 内的样例命令)。
#
# 用法:本文件给出 (a) Vault path/policy 约定(ConfigMap,纯文档),
#      (b) llm-gateway 的注入式 Deployment 补丁(实例落地),
#      (c) gateway/admin-api 的注解模板(注释,部署该平面时照搬)。
# 应用顺序:在 00~05 之后 kubectl apply -f 06-vault-secrets.yaml。
---
# (a) Vault path 布局与最小权限 policy —— 纯文档,供运维照抄到 Vault。
apiVersion: v1
kind: ConfigMap
metadata:
  name: cocola-vault-conventions
  namespace: cocola
  labels: { app.kubernetes.io/part-of: cocola, cocola.dev/role: vault-docs }
data:
  path-layout.md: |
    # Vault KV(v2)path 约定

    secret/cocola/platform/        # 平台级 T3 机密(全租户共享)
      auth_secret                  -> COCOLA_AUTH_SECRET   (HS256 全链路签名)
      admin_key                    -> COCOLA_ADMIN_KEY     (admin-api 管理口令)
      anthropic_api_key            -> 上游模型 key
    secret/cocola/users/{user_id}/ # 用户级机密(每用户隔离,按需)
      <name>                       -> 用户自带上游 key 等

    渲染目标(Vault Agent 写文件):/vault/secrets/<name>
    应用读取:令 COCOLA_<NAME>_FILE=/vault/secrets/<name>(S1 *_FILE 缝口)。
  policy-samples.hcl: |
    # 最小权限 policy:平台服务只读平台 path。
    # vault policy write cocola-platform-ro - <<'HCL'
    path "secret/data/cocola/platform/*" {
      capabilities = ["read"]
    }
    # HCL
    #
    # 用户级服务(如需按用户取 key)只读对应用户子树:
    # path "secret/data/cocola/users/{{identity.entity.aliases.<accessor>.name}}/*" {
    #   capabilities = ["read"]
    # }
  bootstrap.md: |
    # 一次性写入机密 + policy + k8s role(运维在能访问 Vault 的机器上执行)。
    vault kv put secret/cocola/platform/auth_secret value="$(openssl rand -hex 32)"
    vault kv put secret/cocola/platform/admin_key value="<your-admin-key>"
    vault kv put secret/cocola/platform/anthropic_api_key value="<sk-ant-...>"
    vault policy write cocola-platform-ro - <<'HCL'
    path "secret/data/cocola/platform/*" { capabilities = ["read"] }
    HCL
    vault write auth/kubernetes/role/cocola-platform \
      bound_service_account_names=cocola-platform \
      bound_service_account_namespaces=cocola \
      policies=cocola-platform-ro ttl=1h
---
# 供注入式 Pod 绑定 Vault k8s role 的 ServiceAccount。
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cocola-platform
  namespace: cocola
  labels: { app.kubernetes.io/part-of: cocola }
---
# (b) llm-gateway 注入式叠加 —— 与 05 的 Deployment 同名,后应用即生效。
# 与 05 的差异:加 Vault Agent inject 注解(渲染 anthropic_api_key /
# auth_secret 到 /vault/secrets/*),并把 COCOLA_*_FILE 指向渲染文件。
# 原生 secretKeyRef 仍保留为「未注入时」回落:_FILE 不存在则 SecretFromEnv 回落到
# secretKeyRef 提供的同名 env。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: cocola
  labels: { app: llm-gateway }
spec:
  replicas: 1
  selector: { matchLabels: { app: llm-gateway } }
  template:
    metadata:
      labels: { app: llm-gateway }
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "cocola-platform"
        # 每个机密一条 secret 注解 + 一条 template 注解(只取 value 字段,去尾换行)。
        vault.hashicorp.com/agent-inject-secret-auth_secret: "secret/data/cocola/platform/auth_secret"
        vault.hashicorp.com/agent-inject-template-auth_secret: |
          {{- with secret "secret/data/cocola/platform/auth_secret" -}}
          {{ .Data.data.value }}
          {{- end -}}
        vault.hashicorp.com/agent-inject-secret-anthropic_api_key: "secret/data/cocola/platform/anthropic_api_key"
        vault.hashicorp.com/agent-inject-template-anthropic_api_key: |
          {{- with secret "secret/data/cocola/platform/anthropic_api_key" -}}
          {{ .Data.data.value }}
          {{- end -}}
    spec:
      serviceAccountName: cocola-platform
      containers:
        - name: llm-gateway
          image: cocola/llm-gateway:dev
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
          env:
            - name: COCOLA_LLM_HOST
              value: "0.0.0.0"
            - name: COCOLA_LLM_PORT
              value: "8080"
            - name: COCOLA_LLM_REDIS_URL
              value: "redis://redis.cocola.svc.cluster.local:6379/0"
            - name: COCOLA_LLM_DEFAULT_ALIAS
              value: "cocola-default"
            - name: COCOLA_LLM_PROVIDER
              valueFrom: { secretKeyRef: { name: cocola-llm, key: provider, optional: true } }
            - name: COCOLA_ANTHROPIC_BASE_URL
              valueFrom: { secretKeyRef: { name: cocola-llm, key: anthropic_base_url, optional: true } }
            - name: COCOLA_ANTHROPIC_MODEL
              valueFrom: { secretKeyRef: { name: cocola-llm, key: anthropic_model, optional: true } }
            # Vault 注入:文件优先(S1 *_FILE 缝口)。未注入时这两个 *_FILE 文件
            # 不存在,read_secret_env 自动回落到下方 secretKeyRef 提供的同名 env。
            - name: COCOLA_ANTHROPIC_API_KEY_FILE
              value: "/vault/secrets/anthropic_api_key"
            - name: COCOLA_ANTHROPIC_API_KEY
              valueFrom: { secretKeyRef: { name: cocola-llm, key: anthropic_api_key, optional: true } }
            - name: COCOLA_AUTH_SECRET_FILE
              value: "/vault/secrets/auth_secret"
            - name: COCOLA_AUTH_SECRET
              valueFrom: { secretKeyRef: { name: cocola-llm, key: auth_secret, optional: true } }
            - name: COCOLA_MODEL_SECRET_KEY
              valueFrom: { secretKeyRef: { name: cocola-llm, key: model_secret_key, optional: true } }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 10
---
# (c) gateway / admin-api 注入模板(注释样例) —— 这两个平面不在本仓 deploy/k8s
# 范围(仅 sandbox plane + llm-gateway),部署它们时把下列片段并入各自 Deployment:
#
# metadata.template.metadata.annotations:
#   vault.hashicorp.com/agent-inject: "true"
#   vault.hashicorp.com/role: "cocola-platform"
#   vault.hashicorp.com/agent-inject-secret-auth_secret: "secret/data/cocola/platform/auth_secret"
#   vault.hashicorp.com/agent-inject-template-auth_secret: |
#     {{- with secret "secret/data/cocola/platform/auth_secret" -}}{{ .Data.data.value }}{{- end -}}
#   # admin-api 另加 admin_key:
#   vault.hashicorp.com/agent-inject-secret-admin_key: "secret/data/cocola/platform/admin_key"
#   vault.hashicorp.com/agent-inject-template-admin_key: |
#     {{- with secret "secret/data/cocola/platform/admin_key" -}}{{ .Data.data.value }}{{- end -}}
#
# spec.serviceAccountName: cocola-platform
# 容器 env:
#   - { name: COCOLA_AUTH_SECRET_FILE, value: "/vault/secrets/auth_secret" }
#   - { name: COCOLA_ADMIN_KEY_FILE,   value: "/vault/secrets/admin_key" }   # 仅 admin-api
