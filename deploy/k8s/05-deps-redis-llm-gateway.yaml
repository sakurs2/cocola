# Test-time dependencies for the M6 acceptance runbook (NOT production).
#
# deploy/k8s/* ships only the SANDBOX plane by design. The Layer C acceptance
# (docs/runbook/m6-gvisor-acceptance.md §3.2) needs a real query to flow from
# the in-sandbox brain to the gateway over service DNS, so this file deploys the
# two upstream dependencies referenced by 04-sandbox-manager.yaml:
#   - redis           -> Service redis.cocola.svc.cluster.local:6379
#   - llm-gateway     -> Service llm-gateway.cocola.svc.cluster.local:8080
#
# Real model creds come from the cocola-llm Secret (see runbook §6); without it
# the gateway boots with COCOLA_LLM_PROVIDER=fake and still answers (canned),
# which is enough to prove the Route-A network path end to end.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: cocola
  labels: { app: redis }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 2
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: cocola
spec:
  selector: { app: redis }
  ports: [{ name: redis, port: 6379, targetPort: 6379 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: cocola
  labels: { app: llm-gateway }
spec:
  replicas: 1
  selector: { matchLabels: { app: llm-gateway } }
  template:
    metadata: { labels: { app: llm-gateway } }
    spec:
      containers:
        - name: llm-gateway
          image: cocola/llm-gateway:dev
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
          env:
            - name: COCOLA_LLM_HOST
              value: "0.0.0.0"
            - name: COCOLA_LLM_PORT
              value: "8080"
            - name: COCOLA_LLM_REDIS_URL
              value: "redis://redis.cocola.svc.cluster.local:6379/0"
            - name: COCOLA_LLM_DEFAULT_ALIAS
              value: "cocola-default"
            # Real model: provider defaults to "fake" (canned) so the path can
            # be proven with zero creds; set these from the cocola-llm Secret to
            # exercise a real upstream (runbook §6).
            - name: COCOLA_LLM_PROVIDER
              valueFrom: { secretKeyRef: { name: cocola-llm, key: provider, optional: true } }
            - name: COCOLA_ANTHROPIC_BASE_URL
              valueFrom: { secretKeyRef: { name: cocola-llm, key: anthropic_base_url, optional: true } }
            - name: COCOLA_ANTHROPIC_API_KEY
              valueFrom: { secretKeyRef: { name: cocola-llm, key: anthropic_api_key, optional: true } }
            - name: COCOLA_ANTHROPIC_MODEL
              valueFrom: { secretKeyRef: { name: cocola-llm, key: anthropic_model, optional: true } }
            - name: COCOLA_MODEL_SECRET_KEY
              valueFrom: { secretKeyRef: { name: cocola-llm, key: model_secret_key, optional: true } }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway
  namespace: cocola
spec:
  selector: { app: llm-gateway }
  ports: [{ name: http, port: 8080, targetPort: 8080 }]
