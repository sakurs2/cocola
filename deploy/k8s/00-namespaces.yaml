# cocola namespaces: control plane vs. user sandboxes.
#
# Separating them lets the sandbox NetworkPolicy / RBAC be scoped tightly: the
# sandbox-manager ServiceAccount only gets pod/pvc/configmap/networkpolicy verbs
# in cocola-sandboxes, never in the control plane.
apiVersion: v1
kind: Namespace
metadata:
  name: cocola
  labels:
    cocola.bytedance.com/part-of: control-plane
---
apiVersion: v1
kind: Namespace
metadata:
  name: cocola-sandboxes
  labels:
    cocola.bytedance.com/part-of: sandboxes
