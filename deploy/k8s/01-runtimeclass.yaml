# gVisor RuntimeClass. Sandbox Pods set runtimeClassName=runsc (the provider's
# default, overridable via COCOLA_K8S_RUNTIME_CLASS) so every user workload runs
# under the gVisor application kernel rather than sharing the host kernel.
#
# Prerequisite: the gVisor containerd shim (containerd-shim-runsc-v1) must be
# installed on every node and registered in containerd's config under the
# handler name referenced below. On managed clusters this is often a node-pool
# toggle (e.g. GKE Sandbox).
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: runsc
handler: runsc
