# OPTIONAL — gVisor RuntimeClass (only needed for the gVisor enhancement).
#
# cocola's default isolation is plain runc + Kubernetes user namespaces, which
# needs NO node-level installation. You only need this RuntimeClass if you want
# the stronger gVisor application-kernel isolation. To enable it:
#   1. Install the gVisor containerd shim (containerd-shim-runsc-v1) on every
#      node and register the "runsc" handler in containerd's config. On managed
#      clusters this is often a node-pool toggle (e.g. GKE Sandbox).
#   2. Apply this RuntimeClass.
#   3. Set COCOLA_K8S_RUNTIME_CLASS=runsc on the sandbox-manager Deployment.
#
# If you are not using gVisor, you can skip applying this file entirely.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: runsc
handler: runsc
