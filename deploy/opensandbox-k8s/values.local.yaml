# Local OpenSandbox Kubernetes runtime values for cocola's k3d/k3s POC.
#
# Install with:
#   helm upgrade --install opensandbox /path/to/opensandbox/kubernetes/charts/opensandbox \
#     --namespace opensandbox-system --create-namespace \
#     -f deploy/opensandbox-k8s/values.local.yaml

opensandbox-controller:
  controller:
    replicaCount: 1
    logLevel: info
    snapshot:
      # The v0.2.0 controller image does not accept --containerd-socket-path.
      # Keep local POC snapshots disabled/implicit; pause/resume is verified in
      # a later registry-backed phase.
      containerdSocketPath: ""

opensandbox-server:
  server:
    replicaCount: 1
    env:
      - name: OPENSANDBOX_INSECURE_SERVER
        value: "YES"
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi
  configToml: |
    [server]
    host = "0.0.0.0"
    port = 80
    api_key = ""

    [log]
    level = "INFO"

    [runtime]
    type = "kubernetes"
    execd_image = "sandbox-registry.cn-zhangjiakou.cr.aliyuncs.com/opensandbox/execd:v1.0.19"

    [kubernetes]
    kubeconfig_path = ""
    namespace = "opensandbox"
    informer_enabled = true
    informer_resync_seconds = 300
    informer_watch_timeout_seconds = 60
    snapshot_create_timeout_seconds = 900
    workload_provider = "batchsandbox"
    batchsandbox_template_file = "/etc/opensandbox/example.batchsandbox-template.yaml"

    [egress]
    image = "sandbox-registry.cn-zhangjiakou.cr.aliyuncs.com/opensandbox/egress:v1.1.2"
    mode = "dns+nft"
