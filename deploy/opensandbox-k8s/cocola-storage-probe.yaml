apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cocola-storage-probe
  labels:
    app.kubernetes.io/name: cocola-storage-probe
    app.kubernetes.io/managed-by: cocola
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cocola-storage-probe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cocola-storage-probe
        app.kubernetes.io/managed-by: cocola
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 10
      tolerations:
        - operator: Exists
          effect: NoSchedule
      containers:
        - name: storage-probe
          image: cocola/storage-probe:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: COCOLA_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: COCOLA_STORAGE_ROOT
              value: /storage
            - name: COCOLA_STORAGE_MEASURE_TIMEOUT
              value: 10s
          ports:
            - name: http
              containerPort: 8095
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              # Session runtimes legitimately create 0700/0600 state owned by
              # uid 10001. The host storage root itself may be root:root 0700,
              # so changing uid cannot traverse both layers. This read-only
              # capability is narrower than DAC_OVERRIDE and the hostPath
              # remains mounted read-only.
              add: ["DAC_READ_SEARCH"]
          volumeMounts:
            - name: session-storage
              mountPath: /storage
              readOnly: true
      volumes:
        - name: session-storage
          hostPath:
            path: /var/lib/cocola/storage
            type: DirectoryOrCreate
