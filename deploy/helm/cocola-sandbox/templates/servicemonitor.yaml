{{- if and .Values.observability.metrics.enabled .Values.observability.metrics.serviceMonitor }}
# Prometheus-Operator discovery for the sandbox-manager metrics port. Gated on
# observability.metrics.serviceMonitor so clusters WITHOUT the Operator CRDs
# render a clean manifest. The RED contract (ADR-0011) is identical to the
# docker-compose scrape config; only the discovery mechanism differs.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sandbox-manager
  namespace: {{ .Values.namespaces.controlPlane }}
  labels:
    {{- include "cocola-sandbox.labels" . | nindent 4 }}
    app: sandbox-manager
spec:
  selector:
    matchLabels:
      app: sandbox-manager
  namespaceSelector:
    matchNames:
      - {{ .Values.namespaces.controlPlane }}
  endpoints:
    - port: metrics
      interval: {{ .Values.observability.metrics.interval }}
      path: /metrics
{{- end }}
