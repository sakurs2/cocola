{{- if .Values.imageWarmer.enabled }}
{{- $warmerImage := .Values.imageWarmer.image | default .Values.sandbox.image }}
{{- $warmerDigest := .Values.imageWarmer.imageDigest | default .Values.sandbox.imageDigest }}
{{- /*
Image warmer DaemonSet (ADR-0012): pre-pull the large (~1.9 GB) sandbox runtime
image onto every candidate node so a new sandbox Pod skips the pull on cold
start. OFF by default (imageWarmer.enabled=false) to match the chart's
zero-node-install default. The initContainer just `true`s — scheduling with the
image is what forces the node-local pull; the pause container keeps the image
pinned in the node cache. Image pulls go through kubelet/containerd, not Pod
network, so the default-deny-egress policy does not block warming.
*/}}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cocola-image-warmer
  namespace: {{ .Values.namespaces.sandboxes }}
  labels:
    app.kubernetes.io/name: cocola-image-warmer
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    cocola.bytedance.com/managed: "true"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cocola-image-warmer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cocola-image-warmer
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        cocola.bytedance.com/managed: "true"
    spec:
      terminationGracePeriodSeconds: 1
      automountServiceAccountToken: false
      {{- with .Values.imageWarmer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imageWarmer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: pull-sandbox-runtime
          image: {{ include "cocola-sandbox.imageRef" (dict "image" $warmerImage "digest" $warmerDigest) }}
          imagePullPolicy: {{ .Values.imageWarmer.imagePullPolicy }}
          command: ["true"]
          resources:
            {{- toYaml .Values.imageWarmer.initResources | nindent 12 }}
      containers:
        - name: pause
          image: {{ .Values.imageWarmer.pauseImage }}
          imagePullPolicy: IfNotPresent
          resources:
            {{- toYaml .Values.imageWarmer.pauseResources | nindent 12 }}
{{- end }}
