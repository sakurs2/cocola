apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-manager
  namespace: {{ .Values.namespaces.controlPlane }}
  labels:
    {{- include "cocola-sandbox.labels" . | nindent 4 }}
    app: sandbox-manager
spec:
  replicas: {{ .Values.sandboxManager.replicas }}
  selector:
    matchLabels:
      app: sandbox-manager
  template:
    metadata:
      labels:
        app: sandbox-manager
        {{- include "cocola-sandbox.labels" . | nindent 8 }}
    spec:
      serviceAccountName: sandbox-manager
      containers:
        - name: sandbox-manager
          image: {{ .Values.sandboxManager.image }}
          imagePullPolicy: {{ .Values.sandboxManager.imagePullPolicy }}
          ports:
            - containerPort: 50051
            {{- if .Values.observability.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.observability.metrics.port }}
            {{- end }}
          env:
            - name: COCOLA_SANDBOX_ADDR
              value: ":50051"
            - name: COCOLA_SANDBOX_PROVIDER
              value: "k8s"
            - name: COCOLA_K8S_NAMESPACE
              value: {{ .Values.namespaces.sandboxes | quote }}
            - name: COCOLA_K8S_RUNTIME_CLASS
              value: {{ .Values.sandbox.runtimeClass | quote }}
            - name: COCOLA_K8S_HOST_USERS
              value: {{ .Values.sandbox.hostUsers | quote }}
            - name: COCOLA_K8S_IMAGE
              value: {{ include "cocola-sandbox.imageRef" (dict "image" .Values.sandbox.image "digest" .Values.sandbox.imageDigest) | quote }}
            {{- with .Values.sandbox.storageClass }}
            - name: COCOLA_K8S_STORAGE_CLASS
              value: {{ . | quote }}
            {{- end }}
            - name: COCOLA_SANDBOX_LLM_BASE_URL
              value: {{ .Values.sandbox.llmBaseURL | quote }}
            - name: COCOLA_SANDBOX_EGRESS_ALLOWLIST
              value: {{ .Values.sandbox.egressAllowlist | quote }}
            - name: COCOLA_REDIS_ADDR
              value: {{ .Values.sandbox.redisAddr | quote }}
            {{- if .Values.observability.metrics.enabled }}
            - name: COCOLA_METRICS_ADDR
              value: ":{{ .Values.observability.metrics.port }}"
            {{- end }}
            {{- if .Values.observability.tracing.enabled }}
            - name: COCOLA_OTEL_ENABLED
              value: "1"
            - name: COCOLA_OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.tracing.endpoint | quote }}
            - name: COCOLA_OTEL_EXPORTER_INSECURE
              value: {{ .Values.observability.tracing.insecure | quote }}
            - name: COCOLA_OTEL_SAMPLER_RATIO
              value: {{ .Values.observability.tracing.samplerRatio | quote }}
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.sandboxManager.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-manager
  namespace: {{ .Values.namespaces.controlPlane }}
  labels:
    {{- include "cocola-sandbox.labels" . | nindent 4 }}
spec:
  selector:
    app: sandbox-manager
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    {{- if .Values.observability.metrics.enabled }}
    - name: metrics
      port: {{ .Values.observability.metrics.port }}
      targetPort: metrics
    {{- end }}
