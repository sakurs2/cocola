# Values for the cocola-sandbox chart.
namespaces:
  controlPlane: cocola
  sandboxes: cocola-sandboxes
  create: true

runtimeClass:
  # OPTIONAL gVisor RuntimeClass. Default isolation is runc + user namespaces,
  # which needs no RuntimeClass at all, so this is off by default. Enable only
  # if you install the gVisor shim on every node and set sandbox.runtimeClass
  # to its name (e.g. "runsc", or "gvisor" on GKE Sandbox).
  install: false
  name: runsc
  handler: runsc

sandboxManager:
  image: cocola/sandbox-manager:dev
  imagePullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Observability switch shared by the sandbox-manager Deployment.
# metrics: scrape endpoint (go-common metrics server). Default ON; the chart
#   exposes the port + ServiceMonitor so a Prometheus Operator can discover it.
# tracing: OTel export. Default OFF (matches ADR-0011: zero overhead unless
#   explicitly enabled). Flip enabled=true + point endpoint at your collector
#   / Tempo OTLP-HTTP receiver to light up distributed traces.
observability:
  metrics:
    enabled: true
    port: 9092
    # Emit a Prometheus-Operator ServiceMonitor. Leave false on clusters
    # without the Operator CRDs installed.
    serviceMonitor: false
    interval: 15s
  tracing:
    enabled: false
    # Go-style host:port; the service normalises it to an OTLP/HTTP URL.
    endpoint: "tempo.observability.svc.cluster.local:4318"
    insecure: true
    samplerRatio: "0.05"

sandbox:
  # Env consumed by the K8s provider inside sandbox-manager.
  # runtimeClass empty => plain runc (no RuntimeClassName). Set to "runsc"
  # (or your cluster's gVisor class) to opt into the gVisor enhancement.
  runtimeClass: ""
  # hostUsers=false enables Kubernetes user namespaces (default-on since 1.33),
  # mapping container root to a non-privileged host uid. "true" disables it;
  # "default" defers to the cluster.
  hostUsers: "false"
  image: cocola/sandbox-runtime:dev
  storageClass: "" # empty => cluster default StorageClass
  llmBaseURL: http://llm-gateway.cocola.svc.cluster.local:8080
  redisAddr: redis.cocola.svc.cluster.local:6379
  pluginsPVC:
    create: true
    name: cocola-plugins
    size: 5Gi
    storageClass: ""
  # Namespace-wide default-deny egress backstop (per-sandbox policies add allowances).
  defaultDenyEgress: true
