# Tempo single-binary, local-filesystem backend — the trace store behind
# Grafana (ADR-0011). Receives OTLP from the OTel Collector (or directly from a
# service when COCOLA_OTEL_EXPORTER_OTLP_ENDPOINT points here). This is a LOCAL
# dev profile: no object storage, no compaction tuning, no auth.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h   # local dev: keep one day of traces

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
